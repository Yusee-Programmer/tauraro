name: Tauraro Self-Hosted Build

on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            ext: ""
          - os: ubuntu-22.04-arm
            platform: linux-arm64
            ext: ""
          - os: windows-latest
            platform: windows-x64
            ext: ".exe"
          - os: macos-latest
            platform: macos-arm64
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------------------------------------
      # Bootstrap resolution:
      #   1. Portable C seed  bootstrap/c/  -> compile to stage0   (primary)
      #   2. Latest GitHub Release zip / binary                    (fallback)
      # The portable C tree is platform-independent and committed, so it is
      # the normal path and bootstraps every runner with no per-platform
      # binaries. The release is only a safety net if bootstrap/c/ is absent.
      # -------------------------------------------------------
      - name: Prepare bootstrap binary
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEST="bootstrap/tauraroc-${{ matrix.platform }}"
          mkdir -p "$DEST"
          READY=false

          # ── 1. Portable C seed: compile bootstrap/c/ -> stage0 ───────
          if [ -f "bootstrap/c/main.c" ]; then
            echo "==> Building stage0 from portable C (bootstrap/c/)"
            case "$RUNNER_OS" in
              Windows) CC=gcc; LIBS="-lm -lws2_32"; CFLAGS="-D_GNU_SOURCE" ;;
              macOS)   CC=cc;  LIBS="-lm"; CFLAGS="" ;;
              *)       CC=gcc; LIBS="-lm -lpthread -lrt"; CFLAGS="-std=gnu11 -D_GNU_SOURCE -D_XOPEN_SOURCE=700" ;;
            esac
            "$CC" -O2 -w -Ibootstrap/c $CFLAGS \
               bootstrap/c/main.c bootstrap/c/module_*.c bootstrap/c/include/core/*.c \
               -o "$DEST/tauraroc${{ matrix.ext }}" $LIBS
            echo "==> stage0 built: $DEST/tauraroc${{ matrix.ext }}"
            READY=true
          fi

          # ── 2. Fallback: latest GitHub Release ───────────────────────
          if [ "$READY" = "false" ]; then
            echo "==> bootstrap/c/ absent; falling back to latest GitHub Release"
            ASSET_LIST=$(gh release view \
                           --repo "${{ github.repository }}" \
                           --json assets \
                           -q '.assets[].name' 2>/dev/null || true)
            if [ -z "$ASSET_LIST" ]; then
              echo "ERROR: no bootstrap/c/ seed and no published release to bootstrap from"
              exit 1
            fi
            echo "==> Release assets: $(echo "$ASSET_LIST" | tr '\n' ' ')"

            # Try the automated zip first, then a raw binary asset.
            for CANDIDATE in \
                "tauraroc-${{ matrix.platform }}.zip" \
                "tauraroc${{ matrix.ext }}"; do
              if echo "$ASSET_LIST" | grep -Fxq "$CANDIDATE"; then
                echo "==> Downloading: $CANDIDATE"
                gh release download \
                  --repo "${{ github.repository }}" \
                  --pattern "$CANDIDATE" \
                  --dir bootstrap/ \
                  --clobber
                if [[ "$CANDIDATE" == *.zip ]]; then
                  rm -rf bootstrap/unzipped
                  unzip -o "bootstrap/$CANDIDATE" -d bootstrap/unzipped/
                  BIN=$(find bootstrap/unzipped -name "tauraroc${{ matrix.ext }}" ! -path "*/src/*" | head -1)
                  [ -z "$BIN" ] && BIN=$(find bootstrap/unzipped -name "tauraroc${{ matrix.ext }}" | head -1)
                  [ -z "$BIN" ] && { echo "ERROR: zip $CANDIDATE had no tauraroc${{ matrix.ext }}"; exit 1; }
                  cp "$BIN" "$DEST/tauraroc${{ matrix.ext }}"
                  rm -rf bootstrap/unzipped
                else
                  mv "bootstrap/$CANDIDATE" "$DEST/tauraroc${{ matrix.ext }}"
                fi
                READY=true
                break
              fi
            done

            if [ "$READY" = "false" ]; then
              echo "ERROR: no matching release asset (wanted tauraroc-${{ matrix.platform }}.zip or tauraroc${{ matrix.ext }})"
              echo "       Available: $(echo "$ASSET_LIST" | tr '\n' ' ')"
              exit 1
            fi
          fi

          # ── Finalise BOOTSTRAP_BIN ────────────────────────────────────
          BOOTSTRAP="$(pwd)/$DEST/tauraroc${{ matrix.ext }}"
          chmod +x "$BOOTSTRAP" 2>/dev/null || true
          # PowerShell needs a native Windows path; cygpath -w converts /d/a/... → D:\a\...
          if [ "$RUNNER_OS" = "Windows" ]; then
            BOOTSTRAP=$(cygpath -w "$BOOTSTRAP")
          fi
          echo "BOOTSTRAP_BIN=$BOOTSTRAP" >> "$GITHUB_ENV"

      # -------------------------------------------------------
      # Single compilation pass.
      # With the updated -o flag behaviour, a bare name like
      #   tauraroc src/main.tr -o tauraroc
      # places the binary in CWD (the repo root), not src/build/.
      # The build scripts reflect this; no post-move step needed.
      # -------------------------------------------------------
      - name: Build (Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        env:
          # Override CC to use -std=gnu11 for ucontext functions on Linux
          CC: "gcc"
          CFLAGS: "-O2 -std=gnu11 -D_GNU_SOURCE -D_XOPEN_SOURCE=700"
          LDFLAGS: "-lm -lpthread -lrt"
        run: bash scripts/build.sh

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/build.ps1

      # -------------------------------------------------------
      # Verify the binary landed at the repo root, then wipe
      # temporary directories before bundling the artifact.
      # -------------------------------------------------------
      - name: Verify binary at repo root
        shell: bash
        run: |
          if [ ! -f "tauraroc${{ matrix.ext }}" ]; then
            echo "ERROR: tauraroc${{ matrix.ext }} not found at repo root"
            ls -la
            exit 1
          fi
          echo "==> Binary present: $(ls -lh tauraroc${{ matrix.ext }})"

      # -------------------------------------------------------
      # Regression test suite: tests/lang/ and tests/regression/,
      # run via `tauraroc --run` against the freshly-built binary
      # on each platform. See scripts/run_tests.sh / run_tests.ps1.
      # -------------------------------------------------------
      - name: Run regression test suite (Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        env:
          # Override CC to use -std=gnu11 for ucontext functions on Linux
          CC: "gcc"
          CFLAGS: "-O2 -std=gnu11 -D_GNU_SOURCE -D_XOPEN_SOURCE=700"
          LDFLAGS: "-lm -lpthread -lrt"
        run: bash scripts/run_tests.sh

      - name: Run regression test suite (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/run_tests.ps1

      # -------------------------------------------------------
      # Soundness corpus: programs that MUST be rejected under --strict (with the
      # right diagnostic) + safe programs that MUST compile/run. Linux additionally
      # builds the accept corpus with ASan/UBSan so latent UB in generated C is a
      # hard failure. See scripts/run_soundness.sh / run_soundness.ps1.
      # -------------------------------------------------------
      - name: Soundness corpus (Linux, +ASan/UBSan)
        if: runner.os == 'Linux'
        shell: bash
        env:
          CC: "gcc"
          ASAN: "1"
        run: bash scripts/run_soundness.sh

      - name: Soundness corpus (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          CC: "gcc"
        run: bash scripts/run_soundness.sh

      - name: Soundness corpus (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/run_soundness.ps1

      # -------------------------------------------------------
      # Leak gate + differential ARC-soundness oracle (Linux / macOS):
      # runs the leak-prone workload under -DTAURARO_MEMCOUNT with borrow
      # elision ON and OFF (--no-elide = pure-ARC ground truth). BOTH must be
      # leak-free AND produce byte-identical net counts — an unsound elision
      # (a dropped/duplicated retain/release) diverges here and fails the gate.
      # -------------------------------------------------------
      - name: Leak gate + elision oracle (Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        env:
          CC: "gcc"
        run: TAURAROC=./tauraroc${{ matrix.ext }} bash scripts/leak_check.sh

      # -------------------------------------------------------
      # Concurrency corpus under sanitizers (Linux): each tests/concurrency/*.tr
      # runs under ThreadSanitizer (data races — a lost Mutex update, or a
      # non-atomic refcount touched by two threads) AND AddressSanitizer (UAF /
      # double-free of state crossing the spawn/Mutex/Shared boundary). This is
      # the oracle that a program compiling under --strict is actually thread-safe
      # at runtime — not just "didn't crash in a few runs".
      # -------------------------------------------------------
      - name: Concurrency corpus — ThreadSanitizer (Linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          CC: "gcc"
          TSAN: "1"
        run: TAURAROC=./tauraroc${{ matrix.ext }} bash scripts/run_concurrency.sh

      - name: Concurrency corpus — AddressSanitizer (Linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          CC: "gcc"
          ASAN: "1"
        run: TAURAROC=./tauraroc${{ matrix.ext }} bash scripts/run_concurrency.sh

      # -------------------------------------------------------
      # Ownership fuzz oracle: generate random ownership-stressing programs and
      # subject each to (1) differential elision (elided == pure-ARC output),
      # (2) net-leak accounting, and (3) AddressSanitizer (double-free / UAF) on
      # Linux. Turns "found by accident" into "found by CI" for the drop/escape
      # analysis. tests/fuzz/FINDINGS.md tracks known-open patterns (HARD tier);
      # the CORE tier here must stay green. See scripts/fuzz_check.sh.
      # -------------------------------------------------------
      - name: Ownership fuzz oracle (Linux, +ASan)
        if: runner.os == 'Linux'
        shell: bash
        env:
          CC: "gcc"
          ASAN: "1"
        run: TAURAROC=./tauraroc${{ matrix.ext }} bash scripts/fuzz_check.sh 120

      - name: Ownership fuzz oracle (macOS / Windows, differential + leak)
        if: runner.os != 'Linux'
        shell: bash
        run: TAURAROC=./tauraroc${{ matrix.ext }} bash scripts/fuzz_check.sh 60

      # -------------------------------------------------------
      # Reactor stress gate: a green-thread echo server hammered by concurrent
      # keep-alive clients, exercising the REAL readiness reactor (epoll on
      # Linux, kqueue on macOS) and its per-request re-arm path. Guards reactor
      # changes — notably the persistent-epoll-registration optimization — from
      # dropping events / mis-tracking fds. Linux/macOS only (Windows uses
      # WSAPoll and is covered locally); timeout-bounded so a hang fails fast.
      # -------------------------------------------------------
      - name: Reactor stress test (Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        env:
          CC: "gcc"
          CFLAGS: "-O2 -std=gnu11 -D_GNU_SOURCE -D_XOPEN_SOURCE=700"
          LDFLAGS: "-lm -lpthread -lrt"
        run: bash scripts/reactor_stress.sh

      # -------------------------------------------------------
      # Cross-compilation gate (Linux). (A) edge/gateway: cross-compile a real
      # heap program to aarch64 Linux and RUN it under qemu — proves the std
      # runtime + ARC cross-compile and execute on ARM. (B) bare-metal: compile a
      # no-OS program freestanding for arm-none-eabi with a custom bump allocator
      # and NO libc, reporting the remaining seams. See docs/dev/08. This is the
      # faithful validator (MinGW can't do freestanding — its stdatomic pulls x86
      # intrinsics). Uses a real cross-toolchain instead.
      # -------------------------------------------------------
      - name: Install cross toolchains (aarch64 + arm-none-eabi + riscv64 + qemu)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu qemu-user-static gcc-arm-none-eabi qemu-system-arm gcc-riscv64-unknown-elf qemu-system-misc

      - name: Cross-compile gate (edge aarch64 run + bare-metal boundary)
        if: runner.os == 'Linux'
        # Blocking: part A (edge aarch64 build + qemu run) is PROVEN green and now
        # guards the std runtime's ARM cross-compilability. Part B (bare-metal
        # boundary) stays informational *within* the script (non-fatal) — it reports
        # the remaining seams to gate; see docs/dev/08.
        shell: bash
        run: TAURAROC=./tauraroc${{ matrix.ext }} bash scripts/cross_check.sh

      # -------------------------------------------------------
      # Bare-metal LINK + RUN: build examples/freestanding/mcu_app/ — a COMPREHENSIVE
      # multi-module Cortex-M3 firmware written 100% in Tauraro (a main module with
      # @allocator/@output/@entry that imports console/mathx/sysinfo sub-modules) —
      # with --freestanding + --emit-ld, then RUN it under qemu-system-arm. Proves a
      # multi-module Tauraro binary executes on bare metal with NO C/.h/.ld shims.
      # -------------------------------------------------------
      - name: Bare-metal run (Cortex-M3 under qemu-system-arm)
        if: runner.os == 'Linux'
        # Blocking: PROVEN green — a Tauraro binary links freestanding and executes
        # on bare metal under qemu (UART prints "hello from bare metal" + a real
        # computed sum). Guards that the freestanding runtime + --freestanding stay
        # link-and-run correct on a real MCU target.
        shell: bash
        run: TAURAROC=./tauraroc${{ matrix.ext }} bash scripts/bare_run.sh

      # Second bare-metal architecture: the SAME --freestanding path targeting RISC-V
      # (qemu 'virt', rv64). The compiler emits the RISC-V _start boot code + linker
      # script; proves the bare-metal support is arch-portable, not Cortex-M-specific.
      - name: Bare-metal run (RISC-V rv64 under qemu-system-riscv64)
        if: runner.os == 'Linux'
        shell: bash
        run: TAURAROC=./tauraroc${{ matrix.ext }} bash scripts/bare_run_riscv.sh

      # Native backend (Path B): compile a Tauraro program STRAIGHT to an x86-64 ELF
      # object (no C source, no gcc for the user code), link it with runtime.o + libc,
      # and run it. Proves the taumir(LIR) -> x86-64 -> ELF -> link pipeline.
      - name: Native backend run (x86-64/ELF, no C)
        if: runner.os == 'Linux'
        shell: bash
        run: TAURAROC=./tauraroc${{ matrix.ext }} bash scripts/native_run.sh

      # Differential oracle: every tests/native/*.tr compiled by BOTH the C backend and the
      # native x86-64/ELF backend must produce byte-identical output — proves the
      # from-scratch machine-code backend matches the reference on all covered features.
      - name: Native ≡ C differential oracle
        if: runner.os == 'Linux'
        shell: bash
        run: TAURAROC=./tauraroc${{ matrix.ext }} bash scripts/native_diff.sh

      # Runtime security regressions (V-001 float-format overflow, etc.) under ASan+UBSan.
      - name: Runtime security tests (ASan/UBSan)
        if: runner.os == 'Linux'
        shell: bash
        run: bash scripts/security_test.sh

      - name: Clean up generated build output
        shell: bash
        run: |
          # src/ is shipped in the artifact, so drop the generated C tree.
          rm -rf src/build

      # -------------------------------------------------------
      # SHA256 checksum of the compiler binary for this platform.
      # The .sha256 file is bundled inside the main artifact (next to
      # the binary and source trees) AND uploaded separately so it can
      # be downloaded standalone and pasted into the release notes.
      # -------------------------------------------------------
      - name: Generate SHA256 checksum
        shell: bash
        run: |
          sha256sum "tauraroc${{ matrix.ext }}" > "tauraroc-${{ matrix.platform }}.sha256"
          cat "tauraroc-${{ matrix.platform }}.sha256"

      # -------------------------------------------------------
      # Artifact = the compiler binary plus the source/library/sample
      # trees that make a usable SDK bundle. (Not the whole workspace:
      # no .git, docs, bootstrap scratch, or build output.)
      # -------------------------------------------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tauraroc-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            tauraroc${{ matrix.ext }}
            tauraroc-${{ matrix.platform }}.sha256
            src/
            std/
            runtime/
            examples/
            benchmarks/

      # -------------------------------------------------------
      # Standalone checksum artifact, one per OS target, so it can be
      # downloaded and pasted into the GitHub release notes manually.
      # -------------------------------------------------------
      - name: Upload SHA256 checksum artifact
        uses: actions/upload-artifact@v4
        with:
          name: tauraroc-${{ matrix.platform }}-sha256
          if-no-files-found: error
          path: tauraroc-${{ matrix.platform }}.sha256

  # -----------------------------------------------------------------
  # Benchmarks: run the C vs Rust vs Tauraro suite (time + peak memory)
  # on Linux after the build, then commit the Markdown report to
  # benchmarks/results.md. Per request: results are NOT uploaded as an
  # artifact -- they live in the repo as a tracked .md file.
  # Only runs on pushes to the default branch (master); skipped on PRs
  # and forks. The commit message carries [skip ci] to avoid re-triggering.
  #
  # IMPORTANT: gated to the canonical org repo (tauraro/tauraro) only, which owns
  # the official benchmark numbers. results.md is auto-generated, so if BOTH the
  # org repo and the dev fork (Yusee-Programmer/tauraro) ran this job they would
  # commit divergent results.md files, and every cross-repo PR (fork -> org) would
  # conflict on it (GitHub's web merge ignores the .gitattributes merge=ours
  # driver). Letting only the org repo touch results.md means the fork never
  # modifies it, so those PRs stay conflict-free everywhere.
  # -----------------------------------------------------------------
  benchmark:
    needs: build
    if: >-
      github.event_name == 'push'
      && github.ref == 'refs/heads/master'
      && github.repository == 'tauraro/tauraro'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Token + full ref so we can commit results.md back to the branch.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install toolchains (gcc, rustc, GNU time)
        run: |
          sudo apt-get update
          sudo apt-get install -y time
          if ! command -v rustc >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          fi

      - name: Download tauraroc (linux-x64 build artifact)
        uses: actions/download-artifact@v4
        with:
          name: tauraroc-linux-x64
          path: artifact/

      - name: Stage compiler at repo root
        run: |
          cp artifact/tauraroc ./tauraroc
          chmod +x ./tauraroc
          ./tauraroc --version || true

      - name: Run benchmark suite (time + peak memory)
        run: |
          bash benchmarks/run_all.sh || true
          echo "===== benchmarks/results.md ====="
          cat benchmarks/results.md || echo "no results.md produced"

      - name: Commit results.md (auto-resolving conflicts)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Register the 'ours' merge driver that .gitattributes maps
          # benchmarks/results.md to, so if master advances while this job runs,
          # results.md auto-resolves to THIS run's freshly-generated file instead
          # of stopping on a conflict. This is the same resolution
          # scripts/resolve-benchmark-conflicts.ps1 sets up locally — running
          # automatically here so it never has to be done by hand.
          git config merge.ours.driver true
          git add benchmarks/results.md
          if git diff --cached --quiet; then
            echo "No benchmark changes to commit."
            exit 0
          fi
          git commit -m "ci: update benchmark results [skip ci]"
          # Push robustly: if origin/master moved since checkout, merge it in
          # (results.md auto-resolves to ours via the driver) and retry. Avoids
          # a failed job — and a conflict the maintainer would resolve by hand —
          # when another push lands during the benchmark run.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:master; then
              echo "Pushed benchmark results."
              exit 0
            fi
            echo "Push rejected (master moved); integrating latest and retrying ($attempt/5)..."
            git fetch origin master
            git merge --no-edit origin/master || {
              echo "Unexpected non-results.md conflict; aborting merge."
              git merge --abort || true
              exit 1
            }
            sleep 3
          done
          echo "Could not push benchmark results after 5 attempts."
          exit 1

  # -----------------------------------------------------------------
  # Release: runs only on v* tag pushes after all builds pass.
  # Downloads each platform artifact (source + binary at root),
  # zips just the binary into tauraroc-<platform>.zip, and publishes
  # a GitHub Release — those zips become the bootstrap for all
  # future build runs.
  # -----------------------------------------------------------------
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download linux-x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: tauraroc-linux-x64
          path: release/linux-x64/

      - name: Download linux-arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: tauraroc-linux-arm64
          path: release/linux-arm64/

      - name: Download windows-x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: tauraroc-windows-x64
          path: release/windows-x64/

      - name: Download macos-arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: tauraroc-macos-arm64
          path: release/macos-arm64/

      # Per-platform binary checksums (generated during the build job),
      # downloaded here so they can be folded into the combined
      # SHA256SUMS.txt and also published as individual release assets.
      - name: Download linux-x64 checksum
        uses: actions/download-artifact@v4
        with:
          name: tauraroc-linux-x64-sha256
          path: release/checksums/

      - name: Download linux-arm64 checksum
        uses: actions/download-artifact@v4
        with:
          name: tauraroc-linux-arm64-sha256
          path: release/checksums/

      - name: Download windows-x64 checksum
        uses: actions/download-artifact@v4
        with:
          name: tauraroc-windows-x64-sha256
          path: release/checksums/

      - name: Download macos-arm64 checksum
        uses: actions/download-artifact@v4
        with:
          name: tauraroc-macos-arm64-sha256
          path: release/checksums/

      # zip -j strips the path so the binary sits at the zip root:
      # unzip tauraroc-linux-x64.zip -d bootstrap/tauraroc-linux-x64/
      # → bootstrap/tauraroc-linux-x64/tauraroc
      - name: Zip per-platform binaries
        run: |
          mkdir -p release/assets
          zip -j release/assets/tauraroc-linux-x64.zip   release/linux-x64/tauraroc
          zip -j release/assets/tauraroc-linux-arm64.zip release/linux-arm64/tauraroc
          zip -j release/assets/tauraroc-windows-x64.zip release/windows-x64/tauraroc.exe
          zip -j release/assets/tauraroc-macos-arm64.zip release/macos-arm64/tauraroc

      # -------------------------------------------------------
      # Combined SHA256SUMS.txt: checksums of the release zips
      # (what users actually download) plus the raw per-platform
      # binary checksums from the build job, for reference.
      # -------------------------------------------------------
      - name: Generate combined SHA256SUMS.txt
        run: |
          cd release/assets
          sha256sum *.zip > SHA256SUMS.txt
          cd -
          echo "" >> release/assets/SHA256SUMS.txt
          echo "# Per-platform binary checksums (uncompressed):" >> release/assets/SHA256SUMS.txt
          cat release/checksums/*.sha256 >> release/assets/SHA256SUMS.txt
          cat release/assets/SHA256SUMS.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Tauraro ${{ github.ref_name }}" \
            --generate-notes \
            release/assets/tauraroc-linux-x64.zip \
            release/assets/tauraroc-linux-arm64.zip \
            release/assets/tauraroc-windows-x64.zip \
            release/assets/tauraroc-macos-arm64.zip \
            release/assets/SHA256SUMS.txt