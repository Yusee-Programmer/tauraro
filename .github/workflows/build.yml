name: Tauraro Self-Hosted Build

on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            ext: ""
          - os: ubuntu-22.04-arm
            platform: linux-arm64
            ext: ""
          - os: windows-latest
            platform: windows-x64
            ext: ".exe"
          - os: macos-latest
            platform: macos-arm64
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------------------------------------
      # Download the latest released bootstrap zip for this
      # platform, unzip it into bootstrap/tauraroc-<platform>/
      # so the binary lives at its original name tauraroc[.exe].
      # Release assets are named  tauraroc-<platform>.zip  and
      # each zip contains only  tauraroc[.exe]  at the root.
      # -------------------------------------------------------
      - name: Download and unzip bootstrap binary
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p bootstrap
          gh release download \
            --repo "${{ github.repository }}" \
            --pattern "tauraroc-${{ matrix.platform }}.zip" \
            --dir bootstrap/ \
            --clobber
          unzip "bootstrap/tauraroc-${{ matrix.platform }}.zip" \
            -d "bootstrap/tauraroc-${{ matrix.platform }}/"
          BOOTSTRAP="$(pwd)/bootstrap/tauraroc-${{ matrix.platform }}/tauraroc${{ matrix.ext }}"
          chmod +x "$BOOTSTRAP" 2>/dev/null || true
          echo "BOOTSTRAP_BIN=$BOOTSTRAP" >> "$GITHUB_ENV"

      # -------------------------------------------------------
      # Single compilation pass — output lands in tauraro/src/build/
      # -------------------------------------------------------
      - name: Build (Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: bash scripts/build.sh

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/build.ps1

      # -------------------------------------------------------
      # Move compiled binary to repo root, then wipe both
      # tauraro/src/build/ and bootstrap/ before bundling.
      # -------------------------------------------------------
      - name: Place binary at repo root
        shell: bash
        run: mv "tauraro/src/build/tauraroc${{ matrix.ext }}" "./tauraroc${{ matrix.ext }}"

      - name: Clean build and bootstrap directories
        shell: bash
        run: |
          rm -rf tauraro/src/build
          rm -rf bootstrap

      # -------------------------------------------------------
      # Artifact = full source tree + tauraroc[.exe] at root.
      # -------------------------------------------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tauraroc-${{ matrix.platform }}
          path: .

  # -----------------------------------------------------------------
  # Release: runs only on v* tag pushes after all builds pass.
  # Downloads each platform artifact, zips just the binary into
  # tauraroc-<platform>.zip (the format the bootstrap step expects),
  # then publishes a GitHub Release with those four zips as assets.
  # -----------------------------------------------------------------
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download linux-x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: tauraroc-linux-x64
          path: release/linux-x64/

      - name: Download linux-arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: tauraroc-linux-arm64
          path: release/linux-arm64/

      - name: Download windows-x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: tauraroc-windows-x64
          path: release/windows-x64/

      - name: Download macos-arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: tauraroc-macos-arm64
          path: release/macos-arm64/

      # Each zip contains only the binary at its root so that after
      # unzip the binary is at bootstrap/tauraroc-<platform>/tauraroc[.exe].
      - name: Zip per-platform binaries
        run: |
          mkdir -p release/assets
          zip -j release/assets/tauraroc-linux-x64.zip    release/linux-x64/tauraroc
          zip -j release/assets/tauraroc-linux-arm64.zip  release/linux-arm64/tauraroc
          zip -j release/assets/tauraroc-windows-x64.zip  release/windows-x64/tauraroc.exe
          zip -j release/assets/tauraroc-macos-arm64.zip  release/macos-arm64/tauraroc

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Tauraro ${{ github.ref_name }}" \
            --generate-notes \
            release/assets/tauraroc-linux-x64.zip \
            release/assets/tauraroc-linux-arm64.zip \
            release/assets/tauraroc-windows-x64.zip \
            release/assets/tauraroc-macos-arm64.zip
