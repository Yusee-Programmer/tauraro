name: Tauraro Self-Hosted Build

on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            ext: ""
            seed_dir: tauraroc-Linux-X64
          - os: ubuntu-22.04-arm
            platform: linux-arm64
            ext: ""
            seed_dir: tauraroc-Linux-ARM64
          - os: windows-latest
            platform: windows-x64
            ext: ".exe"
            seed_dir: tauraroc-Windows-X64
          - os: macos-latest
            platform: macos-arm64
            ext: ""
            seed_dir: tauraroc-macOS-ARM64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------------------------------------
      # Bootstrap: try latest GitHub Release zip first.
      # If no release exists yet, fall back to the committed
      # seed folder (tauraroc-<OS>-<ARCH>/tauraroc[.exe]).
      # Once a real release is published the seed folders can
      # be deleted from the repo — this fallback becomes a no-op.
      # -------------------------------------------------------
      - name: Prepare bootstrap binary
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEST="bootstrap/tauraroc-${{ matrix.platform }}"
          mkdir -p "$DEST"
          DOWNLOADED=false

          # ── Try latest GitHub Release ────────────────────────────────
          # List all assets so we can match regardless of how the release
          # was created (automated zip, manual zip, or raw binary upload).
          ASSET_LIST=$(gh release view \
                         --repo "${{ github.repository }}" \
                         --json assets \
                         -q '.assets[].name' 2>/dev/null || true)

          if [ -n "$ASSET_LIST" ]; then
            echo "==> Release assets found: $(echo "$ASSET_LIST" | tr '\n' ' ')"

            # Candidates tried in preference order:
            #  1. our automated zip name  (tauraroc-linux-x64.zip)
            #  2. legacy seed-dir zip     (tauraroc-Linux-X64.zip)
            #  3. raw binary              (tauraroc / tauraroc.exe)
            #  4. platform-named binary   (tauraroc-Linux-X64 / tauraroc-Windows-X64.exe)
            for CANDIDATE in \
                "tauraroc-${{ matrix.platform }}.zip" \
                "tauraroc-${{ matrix.seed_dir }}.zip" \
                "tauraroc${{ matrix.ext }}" \
                "tauraroc-${{ matrix.seed_dir }}${{ matrix.ext }}"; do

              if echo "$ASSET_LIST" | grep -Fxq "$CANDIDATE"; then
                echo "==> Downloading: $CANDIDATE"
                gh release download \
                  --repo "${{ github.repository }}" \
                  --pattern "$CANDIDATE" \
                  --dir bootstrap/ \
                  --clobber

                if [[ "$CANDIDATE" == *.zip ]]; then
                  # Unzip into a temp dir, then locate the binary inside
                  # (handles both flat zip and nested folder zip)
                  rm -rf bootstrap/unzipped
                  unzip -o "bootstrap/$CANDIDATE" -d bootstrap/unzipped/
                  BIN=$(find bootstrap/unzipped -name "tauraroc${{ matrix.ext }}" \
                              ! -path "*/src/*" | head -1)
                  [ -z "$BIN" ] && BIN=$(find bootstrap/unzipped \
                              -name "tauraroc${{ matrix.ext }}" | head -1)
                  if [ -z "$BIN" ]; then
                    echo "ERROR: zip $CANDIDATE contained no tauraroc${{ matrix.ext }}"
                    exit 1
                  fi
                  cp "$BIN" "$DEST/tauraroc${{ matrix.ext }}"
                  rm -rf bootstrap/unzipped
                else
                  # Raw binary — rename to the canonical local name
                  mv "bootstrap/$CANDIDATE" "$DEST/tauraroc${{ matrix.ext }}"
                fi

                DOWNLOADED=true
                break
              fi
            done

            if [ "$DOWNLOADED" = "false" ]; then
              echo "==> No matching asset found in the release."
              echo "    Available: $(echo "$ASSET_LIST" | tr '\n' ' ')"
              echo "    Expected one of: tauraroc-${{ matrix.platform }}.zip | tauraroc-${{ matrix.seed_dir }}.zip | tauraroc${{ matrix.ext }} | tauraroc-${{ matrix.seed_dir }}${{ matrix.ext }}"
            fi
          else
            echo "==> No published release found."
          fi

          # ── Fallback: committed seed binary ──────────────────────────
          if [ "$DOWNLOADED" = "false" ]; then
            echo "==> Falling back to committed seed binary in ${{ matrix.seed_dir }}/"
            if [ ! -f "${{ matrix.seed_dir }}/tauraroc${{ matrix.ext }}" ]; then
              echo "ERROR: no release asset matched AND no seed binary at ${{ matrix.seed_dir }}/tauraroc${{ matrix.ext }}"
              exit 1
            fi
            cp "${{ matrix.seed_dir }}/tauraroc${{ matrix.ext }}" "$DEST/"
          fi

          # ── Finalise BOOTSTRAP_BIN ────────────────────────────────────
          BOOTSTRAP="$(pwd)/$DEST/tauraroc${{ matrix.ext }}"
          chmod +x "$BOOTSTRAP" 2>/dev/null || true
          # PowerShell needs a native Windows path; cygpath -w converts /d/a/... → D:\a\...
          if [ "$RUNNER_OS" = "Windows" ]; then
            BOOTSTRAP=$(cygpath -w "$BOOTSTRAP")
          fi
          echo "BOOTSTRAP_BIN=$BOOTSTRAP" >> "$GITHUB_ENV"

      # -------------------------------------------------------
      # Single compilation pass — output lands in src/build/
      # -------------------------------------------------------
      - name: Build (Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: bash scripts/build.sh

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/build.ps1

      # -------------------------------------------------------
      # Move compiled binary to repo root, then wipe all
      # temporary and seed directories before bundling so the
      # artifact is clean: source + tauraroc[.exe] at root only.
      # -------------------------------------------------------
      - name: Place binary at repo root
        shell: bash
        run: mv "src/build/tauraroc${{ matrix.ext }}" "./tauraroc${{ matrix.ext }}"

      - name: Clean up temporary and seed directories
        shell: bash
        run: |
          rm -rf src/build
          rm -rf bootstrap
          rm -rf tauraroc-Linux-X64
          rm -rf tauraroc-Linux-ARM64
          rm -rf tauraroc-Windows-X64
          rm -rf tauraroc-macOS-ARM64

      # -------------------------------------------------------
      # Artifact = full source tree + tauraroc[.exe] at root.
      # -------------------------------------------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tauraroc-${{ matrix.platform }}
          path: .

  # -----------------------------------------------------------------
  # Release: runs only on v* tag pushes after all builds pass.
  # Downloads each platform artifact (source + binary at root),
  # zips just the binary into tauraroc-<platform>.zip, and publishes
  # a GitHub Release — those zips become the bootstrap for all
  # future build runs.
  # -----------------------------------------------------------------
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download linux-x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: tauraroc-linux-x64
          path: release/linux-x64/

      - name: Download linux-arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: tauraroc-linux-arm64
          path: release/linux-arm64/

      - name: Download windows-x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: tauraroc-windows-x64
          path: release/windows-x64/

      - name: Download macos-arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: tauraroc-macos-arm64
          path: release/macos-arm64/

      # zip -j strips the path so the binary sits at the zip root:
      # unzip tauraroc-linux-x64.zip -d bootstrap/tauraroc-linux-x64/
      # → bootstrap/tauraroc-linux-x64/tauraroc
      - name: Zip per-platform binaries
        run: |
          mkdir -p release/assets
          zip -j release/assets/tauraroc-linux-x64.zip   release/linux-x64/tauraroc
          zip -j release/assets/tauraroc-linux-arm64.zip release/linux-arm64/tauraroc
          zip -j release/assets/tauraroc-windows-x64.zip release/windows-x64/tauraroc.exe
          zip -j release/assets/tauraroc-macos-arm64.zip release/macos-arm64/tauraroc

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Tauraro ${{ github.ref_name }}" \
            --generate-notes \
            release/assets/tauraroc-linux-x64.zip \
            release/assets/tauraroc-linux-arm64.zip \
            release/assets/tauraroc-windows-x64.zip \
            release/assets/tauraroc-macos-arm64.zip
